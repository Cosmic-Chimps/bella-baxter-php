name: Publish PHP SDK (Packagist)

# Generates the Kiota client, validates composer.json, and registers/updates
# bella-baxter/sdk on Packagist. Triggered by release-sdk.yml creating a tag.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish bella-baxter/sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install kiota
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - run: dotnet tool install --global Microsoft.OpenApi.Kiota --version 1.30.0

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Tags use 'preview' but PHP uses 'beta' (Composer doesn't support 'preview')
          PHP_VERSION=$(echo "$TAG_VERSION" | sed 's/-preview\./-beta./')
          echo "version=$PHP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing bella-baxter/sdk $PHP_VERSION (from tag $TAG_VERSION)"

      - name: Set production API URL
        run: |
          BELLA_BAXTER_API_URL="${{ vars.BELLA_BAXTER_API_URL || 'https://api.bella-baxter.io' }}"
          if [ "$BELLA_BAXTER_API_URL" != "https://api.bella-baxter.io" ]; then
            grep -rl 'https://api.bella-baxter.io' . --include='*.php' \
              | xargs sed -i "s|https://api.bella-baxter.io|${BELLA_BAXTER_API_URL}|g"
          fi

      - name: Generate Kiota PHP client
        run: |
          kiota generate \
            --language PHP \
            --class-name BellaClient \
            --namespace-name "BellaBaxter\\Generated" \
            --openapi openapi.json \
            --output src/generated \
            --exclude-backward-compatible \
            --clean-output \
            --log-level Warning

      - name: Verify VERSION file matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION=$(cat VERSION 2>/dev/null || echo "")
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION file has '$FILE_VERSION' but expected '$VERSION' — run release-sdk.yml first"
            exit 1
          fi
          echo "✓ VERSION file $FILE_VERSION matches tag $VERSION"

      - name: Validate composer.json
        run: composer validate --strict

      - name: Register or update bella-baxter/sdk on Packagist
        env:
          PACKAGIST_AUTH: "${{ secrets.PACKAGIST_USERNAME }}:${{ secrets.PACKAGIST_MAIN_API_TOKEN }}"
        run: |
          PACKAGE="bella-baxter/sdk"
          REPO_URL="https://github.com/${{ github.repository }}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://packagist.org/packages/${PACKAGE}.json")
          if [ "$STATUS" = "404" ]; then
            echo "Package $PACKAGE not found — creating..."
            RESPONSE=$(curl -sS -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $PACKAGIST_AUTH" \
              "https://packagist.org/api/create-package" \
              -d "{\"repository\":\"$REPO_URL\"}")
          else
            echo "Package $PACKAGE exists — updating..."
            RESPONSE=$(curl -sS -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $PACKAGIST_AUTH" \
              "https://packagist.org/api/update-package" \
              -d "{\"repository\":\"https://packagist.org/packages/$PACKAGE\"}")
          fi
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"success"' || (echo "::error::Packagist API call failed: $RESPONSE" && exit 1)

  notify:
    runs-on: ubuntu-latest
    needs: publish
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.publish.result == 'success' && '✅' || needs.publish.result == 'failure' && '❌' || '⚠️' }} *SDK PHP (Packagist) publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

